name: gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # 与 AGENTS.md 的 Gate 一节保持同一套命令
      - run: npx vitest run
      - run: npx tsc --noEmit
      - run: npx next lint
